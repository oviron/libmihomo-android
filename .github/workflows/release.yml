name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NDK_VERSION: 28.0.13004108
  ANDROID_NDK_PATH: /usr/local/lib/android/sdk/ndk/28.0.13004108
  JAVA_VERSION: '17'
  GO_VERSION: '1.25'
  # no_tailscale drops the mesh-VPN outbound stack we never use (~12 MB/ABI).
  GO_TAGS: with_gvisor,cmfa,no_tailscale

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: src/main/jni/core/go.sum

      - name: Setup JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244  # v4.3.1

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ${{ env.ANDROID_NDK_PATH }}
          key: ndk-${{ env.NDK_VERSION }}-${{ runner.os }}

      - name: Install NDK if cache miss
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;${{ env.NDK_VERSION }}"

      - name: Build libclash.so for all ABIs
        env:
          ANDROID_NDK: ${{ env.ANDROID_NDK_PATH }}
        run: ./build-native.sh

      - name: Verify JNI exports
        run: ./scripts/check-jni-exports.sh

      - name: Build .aar
        run: ./gradlew :assembleRelease --no-daemon

      - name: Rename + SHA-256
        run: |
          mkdir -p dist
          cp build/outputs/aar/libmihomo-android-release.aar dist/libmihomo-android-${{ github.ref_name }}.aar
          cd dist
          sha256sum libmihomo-android-${{ github.ref_name }}.aar > libmihomo-android-${{ github.ref_name }}.aar.sha256
          cat libmihomo-android-${{ github.ref_name }}.aar.sha256

      - name: Write metadata.json (bundled core version + bridgeABI)
        run: |
          CORE=$(cd src/main/jni/core && go list -m -f '{{.Version}}' github.com/metacubex/mihomo)
          ABI=$(grep -oE 'EXPECTED_BRIDGE_ABI: Int = [0-9]+' \
            src/main/kotlin/io/github/oviron/libmihomo/Clash.kt | grep -oE '[0-9]+$')
          AAR="libmihomo-android-${{ github.ref_name }}.aar"
          SHA=$(cut -d' ' -f1 "dist/$AAR.sha256")
          jq -n --arg w "${{ github.ref_name }}" --arg cv "$CORE" --argjson abi "$ABI" \
            --arg aar "$AAR" --arg sha "$SHA" \
            '{wrapper:$w, core:{name:"mihomo", version:$cv}, bridgeABI:$abi, abis:["arm64-v8a","armeabi-v7a","x86_64"], aar:$aar, sha256:$sha}' \
            > "dist/libmihomo-android-${{ github.ref_name }}.metadata.json"
          cat "dist/libmihomo-android-${{ github.ref_name }}.metadata.json"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec  # v6.3.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: GPG sign
        run: |
          cd dist
          gpg --batch --yes \
              --detach-sign --armor \
              libmihomo-android-${{ github.ref_name }}.aar
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: libmihomo-android-aar
          path: |
            dist/libmihomo-android-*.aar
            dist/libmihomo-android-*.aar.sha256
            dist/libmihomo-android-*.aar.asc
            dist/libmihomo-android-*.metadata.json

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine prerelease flag
        id: detect
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          HAS_HYPHEN=false
          [[ "$TAG" == *"-"* ]] && HAS_HYPHEN=true
          if $HAS_HYPHEN; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: artifacts
          pattern: libmihomo-android-*

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.aar' -o -name '*.aar.sha256' -o -name '*.aar.asc' -o -name '*.metadata.json' \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Assert release contains 4 files (aar + sha256 + asc + metadata.json)
        run: |
          COUNT=$(/usr/bin/find release -type f | wc -l | tr -d ' ')
          if [ "$COUNT" -ne 4 ]; then
            echo "Expected 4 release files, got $COUNT:" >&2
            /usr/bin/find release -type f >&2
            exit 1
          fi

      - name: Read bundled core version for the release title
        id: meta
        run: |
          CORE=$(jq -r '.core.name + " " + .core.version' release/libmihomo-android-*.metadata.json)
          echo "core=$CORE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          tag_name: ${{ steps.detect.outputs.tag }}
          name: ${{ steps.detect.outputs.tag }} (${{ steps.meta.outputs.core }})
          prerelease: ${{ steps.detect.outputs.prerelease }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
